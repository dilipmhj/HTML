<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Form Example</h2>
    <form action="" method="post">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter Your Name"/>
        <br>
        <label for="password">Password</label>
        <input type="password" id="password"/>
        <br>
        <label for="age">Age</label>
        <input type="number" id="age"/>
        <br>
        <label for="email">Email Address</label>
        <input type="email" id="email"/>
        <br>
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" value="+977"/>
        <br>

        <!--Checkbox-->
        <label for="hobbies">Hobbies</label>
        <input type="checkbox" id="hobbies"/>Swimming
        <input type="checkbox" id="hobbies"/>Singing
        <input type="checkbox" id="hobbies"/>Dancing
        <br>

        <!--Radiobutton-->
        <label for="gender ">Gender</label>
        <input type="radio" id="gender"/>Male
        <input type="radio" id="gender"/>Female
        <input type="radio" id="gender"/>Other
        <br>


        <!--file-->
        <label for="docs">File</label>
        <input type="file" id="docs" accept=".jpg, .jpeg, .png"/>
        <br>

        <!--Date And Time-->
        <label for="meeting">Meeting Date</label>
        <input type="date" id="meeting"/>
        <input type="time" id="meeting"/>
        <br>

        <!--Range-->
        <label for="rating">Rating</label>
        <input type="range" name="rating" id="rating" min="1" max="10" step="0.5"/>
        <br>

        <!--Color-->
        <label for="color">Color</label>
        <input type="color" id="color"/>
        <br>

        <!--Search-->
        <label for="search">Search</label>
        <input type="search" id="search"/>
        <br>

        <!--Submit-->
        <input type="submit" />
        <br>

        <!--Textarea-->
        <label for="message">Message</label>
        <textarea name="message" id="message" rows="5" cols="50"></textarea>
        <br>




    </form>
    
</body>
</html>
